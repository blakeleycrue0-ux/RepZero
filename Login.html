<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RepZero</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --black: #000; --white: #fff; --grey-dark: #111; --grey-line: #2a2a2a; --grey-text: #666; }
  body { background: var(--black); color: var(--white); font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; }
  .wrap { max-width: 420px; margin: 0 auto; padding: 48px 28px; width: 100%; }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 3px; margin-bottom: 64px; }
  .title { font-family: 'Bebas Neue', sans-serif; font-size: 48px; line-height: 1; margin-bottom: 8px; }
  .sub { color: var(--grey-text); font-size: 14px; margin-bottom: 48px; line-height: 1.5; }
  .field { margin-bottom: 16px; }
  .field-label { color: var(--grey-text); font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; display: block; }
  input { width: 100%; background: var(--grey-dark); border: 1px solid var(--grey-line); border-radius: 4px; padding: 18px 20px; color: var(--white); font-size: 15px; font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.15s; }
  input:focus { border-color: var(--white); }
  input::placeholder { color: var(--grey-text); }
  .btn { margin-top: 8px; width: 100%; background: var(--white); color: var(--black); border: none; padding: 18px; font-size: 14px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; border-radius: 4px; font-family: 'Inter', sans-serif; transition: opacity 0.2s; }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .divider { display: flex; align-items: center; gap: 16px; margin: 28px 0; }
  .divider-line { flex: 1; height: 1px; background: var(--grey-line); }
  .divider-text { color: var(--grey-text); font-size: 12px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
  .btn-outline { width: 100%; background: transparent; color: var(--white); border: 1px solid var(--grey-line); padding: 18px; font-size: 14px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; border-radius: 4px; font-family: 'Inter', sans-serif; transition: border-color 0.2s; }
  .btn-outline:hover { border-color: var(--white); }
  .error { color: #ff4444; font-size: 13px; margin-top: 16px; display: none; }
  .toggle { text-align: center; margin-top: 24px; color: var(--grey-text); font-size: 13px; }
  .toggle span { color: var(--white); cursor: pointer; font-weight: 600; text-decoration: underline; }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">REPZERO</div>
  <div class="title" id="form-title">BIENVENIDO</div>
  <div class="sub" id="form-sub">Entra a tu cuenta para ver tu plan.</div>

  <div class="field">
    <label class="field-label">Email</label>
    <input type="email" id="email" placeholder="tu@email.com">
  </div>
  <div class="field">
    <label class="field-label">Contrasena</label>
    <input type="password" id="password" placeholder="••••••••">
  </div>

  <div class="error" id="error-msg"></div>

  <button class="btn" id="main-btn" style="margin-top:24px" onclick="handleAuth()">Entrar</button>

  <div class="divider"><div class="divider-line"></div><div class="divider-text">o</div><div class="divider-line"></div></div>

  <div class="toggle" id="toggle-text">No tienes cuenta? <span onclick="toggleMode()">Crear cuenta</span></div>
</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

  const supabase = createClient(
    'https://msmwaldktlrxhxvarepj.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1zbXdhbGRrdGxyeGh4dmFyZXBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5NzQwNzcsImV4cCI6MjA5NzU1MDA3N30.Lpr8P9SsTG_7i_iPORqu2gt9pffpnvaZ_oqx5wsCQwI'
  );

  let isLogin = true;

  window.toggleMode = function() {
    isLogin = !isLogin;
    document.getElementById('form-title').textContent = isLogin ? 'BIENVENIDO' : 'CREAR CUENTA';
    document.getElementById('form-sub').textContent = isLogin ? 'Entra a tu cuenta para ver tu plan.' : 'Crea tu cuenta gratis. Sin tarjeta.';
    document.getElementById('main-btn').textContent = isLogin ? 'Entrar' : 'Crear cuenta';
    document.getElementById('toggle-text').innerHTML = isLogin
      ? 'No tienes cuenta? <span onclick="toggleMode()">Crear cuenta</span>'
      : 'Ya tienes cuenta? <span onclick="toggleMode()">Entrar</span>';
    document.getElementById('error-msg').style.display = 'none';
  };

  window.handleAuth = async function() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('main-btn');
    const errEl = document.getElementById('error-msg');

    if (!email || !password) {
      errEl.textContent = 'Rellena todos los campos.';
      errEl.style.display = 'block';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Cargando...';
    errEl.style.display = 'none';

    try {
      let result;
      if (isLogin) {
        result = await supabase.auth.signInWithPassword({ email, password });
      } else {
        result = await supabase.auth.signUp({ email, password });
      }

      if (result.error) {
        errEl.textContent = result.error.message;
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = isLogin ? 'Entrar' : 'Crear cuenta';
        return;
      }

      // Check if profile exists
      const user = result.data.user;
      if (user) {
        const { data: profile } = await supabase
          .from('repzero_profiles')
          .select('*')
          .eq('user_id', user.id)
          .single();

        if (profile) {
          window.location.href = 'home.html';
        } else {
          window.location.href = 'onboarding.html';
        }
      }
    } catch (e) {
      errEl.textContent = 'Error de conexion. Intenta de nuevo.';
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = isLogin ? 'Entrar' : 'Crear cuenta';
    }
  };

  // Check if already logged in
  supabase.auth.getSession().then(({ data: { session } }) => {
    if (session) window.location.href = 'home.html';
  });
</script>
</body>
</html>
